name: Godlike Server Auto Renew

on:
  workflow_dispatch: # 支持手动触发
  repository_dispatch: # 支持来自 cron-job.org 的外部触发
    types: [renew_event]
  schedule:
    - cron: '0 */6 * * *' # 每6小时自动运行一次（备用）

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Renew Script
        env:
          GODLIKE_EMAIL: ${{ secrets.GODLIKE_EMAIL }}
          GODLIKE_PASSWORD: ${{ secrets.GODLIKE_PASSWORD }}
        run: python renew.py

      - name: Upload Screenshots
        if: always() # 无论成功失败都上传截图
        uses: actions/upload-artifact@v4
        with:
          name: workflow-screenshots
          path: "*.png"
